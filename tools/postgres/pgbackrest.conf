# pgBackRest configuration for CPA Platform production database
# Stanza: cpa-prod
# Documentation: https://pgbackrest.org/configuration.html

[global]

# ── Repo configuration ────────────────────────────────────────────────
# Primary backup repository. Uses S3-compatible storage (works with
# AWS S3 or Azure Blob via the S3-compat gateway).
repo1-type=s3
repo1-path=/cpa-prod-backups
repo1-s3-bucket=cpa-platform-backups
repo1-s3-region=ap-southeast-2
repo1-s3-endpoint=s3.ap-southeast-2.amazonaws.com

# ── Retention ─────────────────────────────────────────────────────────
# Keep 7 full backups (one week of daily fulls).
repo1-retention-full=7

# Keep 4 differential backups between each full (6-hourly incrementals
# across one day means 4 diffs per full cycle).
repo1-retention-diff=4

# ── Compression ───────────────────────────────────────────────────────
# lz4 gives near-memcpy speed with decent ratio — ideal for WAL
# segments where throughput matters more than absolute size.
compress-type=lz4

# ── Parallelism ───────────────────────────────────────────────────────
# Keep process-max conservative (2) so backups don't starve production
# I/O. Increase only if dedicated backup CPU is available.
process-max=2

# ── WAL archiving ─────────────────────────────────────────────────────
# archive-async lets PostgreSQL return from archive_command immediately
# while pgBackRest ships WAL in the background. This keeps commit
# latency low and ensures RPO ≤ 5 minutes under normal conditions.
archive-async=y

# Spool path for async WAL archiving — pgBackRest stages segments here
# before shipping to the repo. Must be on a fast local filesystem.
spool-path=/var/spool/pgbackrest

# ── Logging ───────────────────────────────────────────────────────────
# 'info' is the right balance for production — captures start/stop and
# summary without flooding logs. Switch to 'detail' for troubleshooting.
log-level-console=info
log-level-file=info

# ── Stanza definition ────────────────────────────────────────────────
[cpa-prod]

# Path to the PostgreSQL data directory.
pg1-path=/var/lib/postgresql/16/main

# PostgreSQL port (default 5432).
pg1-port=5432
