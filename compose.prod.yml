services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      API_URL: http://api:3000
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  # S3-compatible object storage for the evidence vault, brand logos and
  # server-rendered PDFs. Private bucket — every object is reached through a
  # short-lived presigned URL, so MinIO is never exposed for anonymous reads.
  # Caddy terminates TLS at s3.archiveone.com.au and proxies here; the API
  # signs presigned URLs for that same public host so signatures validate.
  # No healthcheck: the minio server image ships no curl/mc to probe with,
  # and the API only needs MinIO lazily (presign is offline; putObject runs
  # in jobs), so start-order ordering is sufficient.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Browser PUTs originate from the app origin (cross-origin to the s3
      # subdomain), so MinIO must echo CORS headers for those origins.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ALLOW_ORIGIN}
    volumes:
      - minio-data:/data

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    command: ['sh', '-lc', 'cd packages/db && node dist/migrate.js']
    profiles:
      - tools

  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: cpa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: archiveone
      CPA_APP_PASSWORD: ${CPA_APP_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cpa -d archiveone']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  minio-data:
