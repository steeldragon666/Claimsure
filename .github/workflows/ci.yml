name: CI

on:
  push:
    branches: [main, 'p1/**', 'p2/**', 'p3/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_USER: cpa
          POSTGRES_PASSWORD: cpa
          POSTGRES_DB: cpa_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpa -d cpa_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Migrations + privileged DB access (cpa role)
      DATABASE_URL: postgres://cpa:cpa@localhost:5432/cpa_dev
      # Application runtime (cpa_app role; created by migration 0002)
      DATABASE_URL_APP: postgres://cpa_app:cpa_app_dev_pwd@localhost:5432/cpa_dev
      # Session JWT secret — used by W2/W3/W4 unit tests that sign JWTs
      SESSION_JWT_SECRET: ci-test-32-bytes-of-entropy-padd!
      # Classifier implementation — 'stub' uses deterministic regex fallback (no API key needed in CI)
      CLASSIFIER_IMPL: stub
      # AES-256-GCM key for OAuth token encryption (B3). Static for CI; rotated in prod.
      TOKEN_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      # DocuSign webhook HMAC secret — fixture value for B5 webhook tests.
      DOCUSIGN_WEBHOOK_HMAC_SECRET: ci-docusign-webhook-secret
      # Xero accounting OAuth — stubbed for CI; real values in production secrets
      XERO_ACCOUNTING_CLIENT_ID: ci-test-client-id
      XERO_ACCOUNTING_CLIENT_SECRET: ci-test-client-secret
      XERO_ACCOUNTING_REDIRECT_URI: http://localhost:3000/v1/integrations/xero-accounting/callback
      XERO_IMPL: stub

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Init pgvector + pgcrypto
        run: PGPASSWORD=cpa psql -h localhost -U cpa -d cpa_dev -f tools/postgres/init.sql

      - name: Build
        run: pnpm build

      - name: Migrate (creates cpa_app role + RLS policies)
        run: pnpm db:migrate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Format check
        run: pnpm format:check

  e2e:
    name: Playwright e2e
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_USER: cpa
          POSTGRES_PASSWORD: cpa
          POSTGRES_DB: cpa_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpa -d cpa_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Migrations + privileged DB access (cpa role)
      DATABASE_URL: postgres://cpa:cpa@localhost:5432/cpa_dev
      # Application runtime (cpa_app role; created by migration 0002)
      DATABASE_URL_APP: postgres://cpa_app:cpa_app_dev_pwd@localhost:5432/cpa_dev
      # Session JWT secret — fixture mints JWTs the API will accept
      SESSION_JWT_SECRET: ci-test-32-bytes-of-entropy-padd!
      # Classifier implementation — 'stub' uses deterministic regex fallback (no API key needed in CI)
      CLASSIFIER_IMPL: stub
      # AES-256-GCM key for OAuth token encryption (B3); api boots may touch routes that read it.
      TOKEN_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      # DocuSign webhook HMAC secret — needed if any e2e exercises /v1/integrations/docusign/webhook.
      DOCUSIGN_WEBHOOK_HMAC_SECRET: ci-docusign-webhook-secret
      # Xero accounting OAuth — stubbed for CI; real values in production secrets
      XERO_ACCOUNTING_CLIENT_ID: ci-test-client-id
      XERO_ACCOUNTING_CLIENT_SECRET: ci-test-client-secret
      XERO_ACCOUNTING_REDIRECT_URI: http://localhost:3000/v1/integrations/xero-accounting/callback
      XERO_IMPL: stub
      # Override Playwright webServer URLs (default ports stand)
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Init pgvector + pgcrypto
        run: PGPASSWORD=cpa psql -h localhost -U cpa -d cpa_dev -f tools/postgres/init.sql

      - name: Build (workspace packages — produces dist/)
        run: pnpm build

      - name: Migrate (creates cpa_app role + RLS policies + all schemas)
        run: pnpm db:migrate

      - name: Install Chromium for Playwright
        run: pnpm --filter @cpa/web exec playwright install --with-deps chromium

      - name: Run e2e suite
        run: pnpm --filter @cpa/web exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7
          if-no-files-found: ignore
