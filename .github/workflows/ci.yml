name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:0.8.0-pg16
        env:
          POSTGRES_USER: cpa
          POSTGRES_PASSWORD: cpa
          POSTGRES_DB: cpa_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpa -d cpa_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://cpa:cpa@localhost:5432/cpa_dev

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Init pgvector + pgcrypto
        run: PGPASSWORD=cpa psql -h localhost -U cpa -d cpa_dev -f tools/postgres/init.sql

      - name: Build
        run: pnpm build

      - name: Migrate
        run: pnpm db:migrate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Format check
        run: pnpm format:check
