document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rif,system-ui,sans-serif;\n    --f-mono:\"JetBrains Mono\",ui-monospace,monospace;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--ink);color:var(--bone);font-family:var(--f-sans);scroll-behavior:smooth}\n  ::selection{background:var(--amber);color:var(--ink)}\n  ::-webkit-scrollbar{width:8px;height:8px}\n  ::-webkit-scrollbar-track{background:var(--ink)}\n  ::-webkit-scrollbar-thumb{background:rgba(240,235,226,.10);border-radius:4px}\n  a{color:inherit;text-decoration:none}\n  button{font-family:inherit;cursor:pointer}\n\n  /* Atoms */\n  .diamond{display:inline-block;width:8px;height:8px;background:var(--amber);transform:rotate(45deg);flex-shrink:0}\n  .mono{font-family:var(--f-mono);text-transform:uppercase;letter-spacing:.22em;font-size:11px;color:var(--bone-3)}\n  .mono.amber{color:var(--amber)}\n  .eyebrow{display:flex;align-items:center;gap:14px;font-family:var(--f-mono);font-size:13px;letter-spacing:.22em;color:var(--bone-3);text-transform:uppercase}\n  .eyebrow .hr{width:48px;height:1px;background:var(--amber);opacity:.7}\n  .container{max-width:1320px;margin:0 auto;padding:0 56px}\n  .btn{padding:14px 22px;border:none;font-family:var(--f-mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase}\n  .btn.primary{background:var(--amber);color:var(--ink);font-weight:600}\n  .btn.ghost{background:transparent;color:var(--bone);border:1px solid var(--rule-strong)}\n  .btn.lg{padding:18px 30px;font-size:13px}\n\n  /* Nav */\n  .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(11,11,13,.72);backdrop-filter:blur(14px);border-bottom:1px solid var(--rule)}\n  .nav-row{display:flex;align-items:center;gap:32px;padding:16px 0}\n  .brand{display:flex;align-items:center;gap:12px}\n  .brand .diamond{width:11px;height:11px;box-shadow:0 0 14px rgba(225,162,58,.55)}\n  .brand-name{font-family:var(--f-serif);font-weight:600;font-size:20px;letter-spacing:-0.01em}\n  .nav a{font-size:13.5px;color:var(--bone-2)}\n  .nav document.getElementById('px-seats-text').textContent = t.founderSeats + ' consultancies';\n    document.getElementById('px-founder-text').textContent = fmtDollar(founderClm);\n    document.getElementById('px-annual-text').textContent = fmtDollar(t.annualMin);\n\n    // Seat board\n    const taken = Math.min(t.founderSeats, t.seatsTaken);\n    document.getElementById('px-seat-count').textContent =\n      taken + ' CLAIMED · ' + (t.founderSeats - taken) + ' OPEN';\n    document.getElementById('px-board-founder').innerHTML =\n      fmtDollar(founderClm) + '<span class=\"unit\"> /claim<\u002Fspan>';\n    document.getElementById('px-board-standard').innerHTML =\n      fmtDollar(t.perClaim) + '<span class=\"unit\"> /claim<\u002Fspan>';\n\n    const seats = document.getElementById('seats');\n    seats.innerHTML = '';\n    for (let i = 0; i < t.founderSeats; i++) {\n      const s = document.createElement('div');\n      s.className = 'seat' + (i < taken ? ' taken' : '');\n      s.textContent = String(i + 1).padStart(2, '0');\n      seats.appendChild(s);\n    }\n  }\n\n  // Live AEST clock\n  const tick = () => {\n    const fmt = new Intl.DateTimeFormat('en-AU', {\n      timeZone: 'Australia/Sydney',\n      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,\n    });\n    document.getElementById('liveclock').textContent = 'LIVE · ' + fmt.format(new Date()) + ' AEST';\n  };\n  setInterval(tick, 250); tick();\n  apply();\n\n  // ── Tweaks panel ──────────────────────────────────────\n  const PANEL_CSS = `\n    .twk{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:300px;\n      background:rgba(250,249,247,.92);color:#29261b;\n      -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);\n      border:.5px solid rgba(255,255,255,.6);border-radius:14px;\n      box-shadow:0 12px 40px rgba(0,0,0,.22);\n      font:12px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}\n    .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:.5px solid rgba(0,0,0,.08)}\n    .twk-hd b{font-size:12px;font-weight:600}\n    .twk-x{background:transparent;border:0;width:22px;height:22px;cursor:pointer;color:rgba(41,38,27,.55);font-size:14px}\n    .twk-x:hover{color:#29261b}\n    .twk-body{padding:14px;display:flex;flex-direction:column;gap:12px}\n    .twk-row{display:flex;flex-direction:column;gap:6px}\n    .twk-lbl{display:flex;justify-content:space-between;font-size:11px;color:rgba(41,38,27,.7)}\n    .twk-lbl b{color:#29261b;font-variant-numeric:tabular-nums;font-weight:500}\n    .twk input[type=range]{width:100%;accent-color:#b88a3d}\n    .twk-derived{margin-top:4px;padding:8px 10px;border-radius:6px;background:rgba(225,162,58,.10);border:1px solid rgba(225,162,58,.35);font-family:ui-monospace,monospace;font-size:11px;display:flex;flex-direction:column;gap:4px}\n    .twk-derived div{display:flex;justify-content:space-between}\n    .twk-sect{font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(41,38,27,.5);margin-top:4px;padding-top:6px;border-top:.5px solid rgba(0,0,0,.06)}\n    .twk-sect:first-child{margin-top:0;padding-top:0;border-top:0}\n  `;\n\n  let panel;\n  function buildPanel() {\n    if (panel) return panel;\n    const style = document.createElement('style');\n    style.textContent = PANEL_CSS;\n    document.head.appendChild(style);\n\n    panel = document.createElement('div');\n    panel.className = 'twk';\n    panel.style.display = 'none';\n    panel.innerHTML = `\n      <div class=\"twk-hd\"><b>Tweaks<\u002Fb><button class=\"twk-x\" id=\"twk-close\">×<\u002Fbutton><\u002Fdiv>\n      <div class=\"twk-body\">\n        <div class=\"twk-sect\">Pricing<\u002Fdiv>\n        <div class=\"twk-row\"><span class=\"twk-lbl\"><span>Per-claim fee<\u002Fspan><b id=\"lbl-perClaim\"><\u002Fb><\u002Fspan><input type=\"range\" id=\"r-perClaim\" min=\"500\" max=\"5000\" step=\"50\"><\u002Fdiv>\n        <div class=\"twk-row\"><span class=\"twk-lbl\"><span>Annual minimum<\u002Fspan><b id=\"lbl-annualMin\"><\u002Fb><\u002Fspan><input type=\"range\" id=\"r-annualMin\" min=\"0\" max=\"120000\" step=\"5000\"><\u002Fdiv>\n        <div class=\"twk-sect\">Founder cohort<\u002Fdiv>\n        <div class=\"twk-row\"><span class=\"twk-lbl\"><span>Discount<\u002Fspan><b id=\"lbl-founderPct\"><\u002Fb><\u002Fspan><input type=\"range\" id=\"r-founderPct\" min=\"0\" max=\"75\" step=\"5\"><\u002Fdiv>\n        <div class=\"twk-row\"><span class=\"twk-lbl\"><span>Seats total<\u002Fspan><b id=\"lbl-founderSeats\"><\u002Fb><\u002Fspan><input type=\"range\" id=\"r-founderSeats\" min=\"5\" max=\"50\" step=\"5\"><\u002Fdiv>\n        <div class=\"twk-row\"><span class=\"twk-lbl\"><span>Seats claimed<\u002Fspan><b id=\"lbl-seatsTaken\"><\u002Fb><\u002Fspan><input type=\"range\" id=\"r-seatsTaken\" min=\"0\" max=\"50\" step=\"1\"><\u002Fdiv>\n        <div class=\"twk-derived\">\n          <div><span style=\"opacity:.6\">FOUNDER<\u002Fspan><span id=\"d-founder\"><\u002Fspan><\u002Fdiv>\n          <div><span style=\"opacity:.6\">STANDARD<\u002Fspan><span id=\"d-standard\"><\u002Fspan><\u002Fdiv>\n          <div><span style=\"opacity:.6\">ANNUAL MIN<\u002Fspan><span id=\"d-annual\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    document.body.appendChild(panel);\n\n    const wireSlider = (key, fmt) => {\n      const r = document.getElementById('r-' + key);\n      const l = document.getElementById('lbl-' + key);\n      r.value = TWEAKS[key];\n      l.textContent = fmt(TWEAKS[key]);\n      r.addEventListener('input', () => {\n        const v = parseInt(r.value, 10);\n        TWEAKS[key] = v;\n        l.textContent = fmt(v);\n        // Clamp seatsTaken if it exceeds total\n        if (key === 'founderSeats' && TWEAKS.seatsTaken > v) {\n          TWEAKS.seatsTaken = v;\n          document.getElementById('r-seatsTaken').value = v;\n          document.getElementById('lbl-seatsTaken').textContent = v;\n        }\n        apply();\n        updateDerived();\n        try {\n          window.parent.postMessage({\n            type: '__edit_mode_set_keys',\n            edits: { [key]: v }\n          }, '*');\n        } catch (e) {}\n      });\n    };\n\n    wireSlider('perClaim',     (v) => '$' + v.toLocaleString());\n    wireSlider('annualMin',    (v) => '$' + v.toLocaleString());\n    wireSlider('founderPct',   (v) => v + '%');\n    wireSlider('founderSeats', (v) => v);\n    wireSlider('seatsTaken',   (v) => v);\n\n    function updateDerived() {\n      const fClm = Math.round(TWEAKS.perClaim * (1 - TWEAKS.founderPct/100));\n      document.getElementById('d-founder').textContent = '$' + fClm.toLocaleString() + ' /claim';\n      document.getElementById('d-standard').textContent = '$' + TWEAKS.perClaim.toLocaleString() + ' /claim';\n      document.getElementById('d-annual').textContent = '$' + TWEAKS.annualMin.toLocaleString() + ' /yr';\n    }\n    updateDerived();\n\n    document.getElementById('twk-close').addEventListener('click', () => {\n      panel.style.display = 'none';\n      try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) {}\n    });\n\n    return panel;\n  }\n\n  // Host protocol\n  window.addEventListener('message', (e) => {\n    const m = e.data;\n    if (!m || typeof m !== 'object') return;\n    if (m.type === '__activate_edit_mode') {\n      buildPanel().style.display = 'block';\n    } else if (m.type === '__deactivate_edit_mode') {\n      if (panel) panel.style.display = 'none';\n    }\n  });\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
